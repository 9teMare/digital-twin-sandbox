services:
  digital-twin-agent-sandbox:
    # 从本仓库构建镜像（根目录 Dockerfile，开发模式同时启动前后端）
    build:
      context: .
      dockerfile: Dockerfile
    image: digital-twin-agent-sandbox:latest
    container_name: digital-twin-agent-sandbox
    env_file:
      - .env
    ports:
      - "3000:3000"   # 前端 (Vite)
      - "5001:5001"   # 后端 (Flask API)
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
