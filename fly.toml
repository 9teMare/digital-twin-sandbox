# fly.toml app configuration file generated for digital-twin-sandbox on 2026-06-16T15:50:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'digital-twin-sandbox'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
